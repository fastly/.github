name: Update member montage

on:
  schedule:
    - cron: "0 9 * * MON"
  repository_dispatch:
    types: [update-montage]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow requests

      - name: Generate montage
        run: python3 scripts/generate_montage.py

      - name: Commit if changed
        run: |
          git diff --quiet images/montage.png && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/montage.png
          git commit -m "chore: regenerate member montage"
          git push
